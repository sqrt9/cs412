{% extends "mini_insta/base.html" %}

{% block title %}Create Post{% endblock %}

{% block content %}
<h1>Create a Post</h1>

<form method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
        <tr>
            <th>Image URL:</th>
            <td><input type="url" name="image_url"></td>
        </tr>
    </table>
    <button type="submit">Submit</button>
    <a href="{% url 'show_profile' profile.pk %}">
        <button type="button">Cancel</button>
    </a>
</form>

{% endblock %}
