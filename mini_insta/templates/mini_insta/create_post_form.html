{% extends "mini_insta/base.html" %}

{% block title %}Create Post{% endblock %}

{% block content %}
<h1>Create a Post</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
        <tr>
            <th>Image Files:</th>
            <td><input type="file" name="media" multiple></td>
        </tr>
    </table>
    <button type="submit">Submit</button>
    <a href="{% url 'show_profile' user.profile.pk %}">
        <button type="button">Cancel</button>
    </a>
</form>

{% endblock %}
