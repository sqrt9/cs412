{% extends 'testpages/base.html' %}

{% block title %}delete {{ album.name }}{% endblock %}

{% block content %}
<div class="track-list-container">
    <h2>delete album</h2>
    <p>are you sure you want to delete <strong>"{{ album.name }}"</strong> by {{ album.artist.name }}?</p>
    <br>
    
    <form method="POST" class="custom-form">
        {% csrf_token %}
        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn" style="background-color: #dc3545;">delete</button>
            <a href="{% url 'my_album' pk=album.pk %}" class="btn btn-secondary">cancel</a>
        </div>
    </form>
</div>
{% endblock %}
